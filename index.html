<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hazmob FPS</title>
<link rel="stylesheet" href="TemplateData/style.css">
<script>
  const overlayBackgroundColor     = "#2e2e2e";
  const progressBarFillColor       = "";
  const progressBarBackgroundColor = "";
  const progressBarBorderColor     = "";
</script>
</head>
<body class="dark">

<script>
  var gameInstance = undefined;
  function FixInputOnSubmit() { document.getElementById("fixInput").blur(); event.preventDefault(); }
  function FixInputUpdate()   { gameInstance.SendMessage('_WebGLKeyboard','ReceiveInputChange',document.getElementById("fixInput").value); }
  function FixInputOnBlur()   { gameInstance.SendMessage('_WebGLKeyboard','LoseFocus'); }
</script>
<div>
  <form onsubmit="FixInputOnSubmit()" autocomplete="off" style="width:0;height:0;position:absolute;top:-9999px;">
    <input type="text" id="fixInput" oninput="FixInputUpdate()" onblur="FixInputOnBlur()" style="font-size:42px;"/>
  </form>
</div>

<div id="unity-container" class="unity-desktop">
  <canvas id="unity-canvas"></canvas>
</div>
<div id="loading-cover" style="display:none;">
  <div id="unity-loading-bar">
    <div id="unity-logo"><img src="logo.png" onerror="this.style.display='none'"></div>
    <div id="unity-progress-bar-empty" style="display:block;">
      <div id="unity-progress-bar-full" style="width:0%;"></div>
    </div>
    <div id="dl-status" style="text-align:center;font-size:12px;color:rgba(255,255,255,.7);
         font-family:sans-serif;margin-top:6px;letter-spacing:.4px;">Hazırlanıyor...</div>
    <div class="spinner" style="display:none;"></div>
  </div>
</div>

<script>
/* AudioContext unlock */
(function(){
  function u(){
    if(window._au) return; window._au=true;
    try{var c=new(window.AudioContext||window.webkitAudioContext)();
      var b=c.createBuffer(1,1,22050);var s=c.createBufferSource();
      s.buffer=b;s.connect(c.destination);s.start(0);c.resume&&c.resume();
    }catch(e){}
    ['touchstart','pointerdown','click'].forEach(function(t){document.removeEventListener(t,u);});
  }
  ['touchstart','pointerdown','click'].forEach(function(t){document.addEventListener(t,u,{passive:true});});
})();
</script>

<script>
/* ================================================================
   CDN Ayarları — değiştir
   ================================================================ */
var BUILD_CDN = "BURAYA_BUILD_CDN";          /* Build klasörünün CDN'i */
var SA_CDN    = "BURAYA_SA_CDN/StreamingAssets"; /* StreamingAssets CDN'i */

var DATA_FILE    = "b61481f1e3d76a798cc9d577ebc1a609";
var LOADER_FILE  = "8b2aa7ebb8ab0cdb36d650cc3e9b841a";
var FRAMEWORK    = "f6ef69d8e3279006f0bcf5fb433b92b0.framework.js.unityweb";
var WASM_FILE    = "382d3bcea5becf83736e7af046a15b02.wasm.unityweb";
var BUNDLE_FILE  = "aa/WebGL/realistic_assets_realistic_79c23d253bdcc1c64f425728f63340c4.bundle";

var DATA_PARTS   = 7;   /* 54.5MB / 8MB = 7 part */
var BUNDLE_PARTS = 7;   /* 50.8MB / 8MB = 7 part */

var config = {
  dataUrl:            null,   /* part'lardan set edilir */
  frameworkUrl:       BUILD_CDN + "/" + FRAMEWORK,
  codeUrl:            BUILD_CDN + "/" + WASM_FILE,
  streamingAssetsUrl: SA_CDN,
  companyName:        "Hazmob",
  productName:        "Hazmob FPS",
  productVersion:     "2.18.21"
};

var container        = document.querySelector("#unity-container");
var canvas           = document.querySelector("#unity-canvas");
var loadingCover     = document.querySelector("#loading-cover");
var progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
var progressBarFull  = document.querySelector("#unity-progress-bar-full");
var spinner          = document.querySelector('.spinner');
var dlStatus         = document.querySelector('#dl-status');

/* Progress renkler */
if(overlayBackgroundColor&&overlayBackgroundColor.trim()&&overlayBackgroundColor!=="-")
  canvas.style.background=overlayBackgroundColor;
if(progressBarFillColor&&progressBarFillColor.trim()&&progressBarFillColor!=="-")
  progressBarFull.style.background=progressBarFillColor;
if(progressBarBackgroundColor&&progressBarBackgroundColor.trim()&&progressBarBackgroundColor!=="-")
  progressBarEmpty.style.background=progressBarBackgroundColor;

if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent))
  container.className = "unity-mobile";

loadingCover.style.display = "";

/* ── Progress bar yardımcısı ───────────────────────────────── */
/* DATA   :  0% →  40%
   BUNDLE : 40% →  80%
   Unity  : 80% → 100%  */
function setBar(pct, label) {
  progressBarFull.style.width = pct.toFixed(1) + '%';
  if (dlStatus) dlStatus.textContent = label || '';
}

var _bundleBlobUrl = null;

/* ── Part indirme ──────────────────────────────────────────── */
async function fetchParts(baseUrl, partCount, barStart, barEnd, labelPrefix) {
  var parts = [];
  for (var i = 0; i < partCount; i++) {
    var pct = barStart + (i / partCount) * (barEnd - barStart);
    setBar(pct, labelPrefix + (i+1) + '/' + partCount + ' (' + Math.round(pct) + '%)');
    var r = await fetch(baseUrl + '.part' + i);
    if (!r.ok) throw new Error(labelPrefix + 'part' + i + ' HTTP ' + r.status);
    parts.push(new Uint8Array(await r.arrayBuffer()));
    pct = barStart + ((i+1) / partCount) * (barEnd - barStart);
    setBar(pct, labelPrefix + (i+1) + '/' + partCount + ' (' + Math.round(pct) + '%)');
    console.log(labelPrefix + 'part' + i + ': ' + parts[parts.length-1].length + ' bytes');
  }
  var total = parts.reduce(function(s,p){return s+p.length;},0);
  var merged = new Uint8Array(total); var off = 0;
  for (var j=0;j<parts.length;j++){merged.set(parts[j],off);off+=parts[j].length;}
  console.log(labelPrefix + 'merged: ' + total + ' bytes');
  return merged;
}

function makeBlobUrl(uint8, filename) {
  var blob = new Blob([uint8], {type:'application/octet-stream'});
  return URL.createObjectURL(blob) + '#' + encodeURIComponent(filename);
}

/* ── Bundle fetch intercept ────────────────────────────────── */
(function(){
  var _orig = window.fetch.bind(window);
  window.fetch = function(url, opts) {
    var s = typeof url==='string' ? url : (url&&url.url)||String(url);
    if (s.includes('realistic_assets_realistic_79c23d253bdcc1c64f425728f63340c4') && _bundleBlobUrl) {
      console.log('[Bundle] fetch intercepted');
      return _orig(_bundleBlobUrl, opts);
    }
    return _orig(url, opts);
  };
  var _xOpen = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(method, url, async, u, p) {
    var s = typeof url==='string' ? url : String(url);
    if (s.includes('realistic_assets_realistic_79c23d253bdcc1c64f425728f63340c4') && _bundleBlobUrl)
      url = _bundleBlobUrl;
    return _xOpen.call(this, method, url, async!==false, u, p);
  };
})();

/* ── Loader ────────────────────────────────────────────────── */
var unityLoader = document.createElement("script");
unityLoader.src = BUILD_CDN + "/" + LOADER_FILE + ".loader.js";
unityLoader.onload = async function() {
  try {
    /* 1. DATA part'ları indir  (0% → 40%) */
    var dataBytes = await fetchParts(
      BUILD_CDN + "/" + DATA_FILE + ".data.unityweb",
      DATA_PARTS, 0, 40, 'Data indiriliyor... ');
    config.dataUrl = makeBlobUrl(dataBytes, DATA_FILE + ".data.unityweb");

    /* 2. BUNDLE part'ları indir (40% → 80%) */
    var bundleBytes = await fetchParts(
      SA_CDN + "/" + BUNDLE_FILE,
      BUNDLE_PARTS, 40, 80, 'Bundle indiriliyor... ');
    var bblob = new Blob([bundleBytes], {type:'application/octet-stream'});
    _bundleBlobUrl = URL.createObjectURL(bblob);
    console.log('[Bundle] Ready');

  } catch(e) { alert("Download error: " + e.message); return; }

  /* 3. Unity başlat (80% → 100%) */
  setBar(80, 'Oyun yükleniyor...');
  createUnityInstance(canvas, config, function(progress) {
    setBar(80 + progress * 20,
      progress < 1 ? 'Oyun yükleniyor... ' + Math.round(80 + progress * 20) + '%' : '');
  }).then(function(inst) {
    gameInstance = inst;
    window.unityInstance = inst;
    loadingCover.style.display = "none";
  }).catch(function(msg) { alert(msg); });
};
document.body.appendChild(unityLoader);

document.addEventListener("pointerdown", function() {
  container.focus(); window.focus(); canvas.focus();
});
</script>
</body>
</html>
